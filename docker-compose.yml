version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-platform-web
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
